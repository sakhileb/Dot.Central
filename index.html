<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dot.Central | Coming Soon</title>
    <meta
      name="description"
      content="Dot.Central is getting ready. A fresh experience is coming soon."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <div class="shape shape--left" aria-hidden="true"></div>
      <div class="shape shape--right" aria-hidden="true"></div>

      <main class="card">
        <img
          src="dot.logos5.png"
          alt="Dot.Central logo"
          class="logo"
        />

        <p class="kicker">We are preparing something special</p>
        <h1>Coming Soon</h1>
        <p class="description">
          Dot.Central is being polished for launch. We are crafting a cleaner,
          faster, and smarter experience for you.
        </p>

        <form class="notify" action="#" method="post" onsubmit="return false;">
          <label for="email" class="sr-only">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            autocomplete="email"
            required
          />
          <button type="submit">Notify Me</button>
        </form>
      </main>
    </div>
  </body>
</html>
